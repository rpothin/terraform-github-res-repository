name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  format:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Terraform Validate
        run: make validate

  docs:
    name: Documentation Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform Docs
        run: |
          TFDOCS_VERSION="v0.21.0"
          TFDOCS_PKG="terraform-docs-${TFDOCS_VERSION}-linux-amd64.tar.gz"
          curl -sSLo "${TFDOCS_PKG}" "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/${TFDOCS_PKG}"
          curl -sSLo terraform-docs.sha256sum "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/terraform-docs-${TFDOCS_VERSION}.sha256sum"
          grep "${TFDOCS_PKG}" terraform-docs.sha256sum | sha256sum -c
          tar -xzf "${TFDOCS_PKG}" terraform-docs
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/
          rm -f "${TFDOCS_PKG}" terraform-docs.sha256sum

      - name: Generate Docs
        run: |
          terraform-docs .
          for dir in examples/*/; do
            terraform-docs "$dir"
          done

      - name: Check for Changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Documentation is out of date. Run 'terraform-docs' for root and example directories, then commit the changes."
            exit 1
          fi

  security:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivy-config: ".trivy.yaml"
          version: "v0.69.3"

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Run Unit Tests
        run: make test-unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Job-level "if" does not support the secrets context; skip known no-secret PR contexts instead.
    if: ${{ vars.ENABLE_INTEGRATION_TESTS == 'true' && vars.GH_OWNER != '' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')) }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Run Integration Tests
        run: make test-integration
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_OWNER: ${{ vars.GH_OWNER }}
